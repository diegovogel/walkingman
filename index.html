<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>The Lexington Walking Man</title>
    <link rel="stylesheet" href="https://unpkg.com/normalize.css@8.0.1/normalize.css" />
    <link rel="stylesheet" href="css/style.css" type="text/css" />
    <script src="//code.jquery.com/jquery-3.6.0.min.js" type="text/javascript"></script>
  </head>
  <body>
    <h1 class="page-title">The Walking Man</h1>

    <div class="previous-location">
      <p>Origin: <span class="location-name"></span></p>
      <p>Left: <span class="date-time"></span></p>
    </div>

    <div class="progress">
      <p class="percentage"></p>
    </div>

    <div class="next-location">
      <p>Destination: <span class="location-name"></span></p>
      <p>ETA: <span class="date-time"></span></p>
    </div>

    <footer>
      <p>City data courtesy of <a href="https://simplemaps.com/data/us-cities" target="_blank">simplemaps</a>.</p>
    </footer>
    
    <script src="js/scripts.js" type="text/javascript"></script>
  </body>
</html>
